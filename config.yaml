# AI 大模型配置
# 支持 OpenAI 兼容接口（OpenAI / DeepSeek / 智谱GLM / 本地模型等）
ai:
  model: glm-5.1              # 模型名称（智谱 GLM-5.1）
  api_base: ""                 # API 地址（建议用 GitHub Secrets）
  api_key: ""                  # API Key（建议用 GitHub Secrets）
  language: 中文               # 输出语言

# Telegram 配置（建议用 GitHub Secrets）
telegram:
  bot_token: ""
  chat_id: ""

# 全局设置
settings:
  fetch_hours: 1               # 抓取最近多少小时的文章（配合15分钟轮询，1小时窗口防止漏抓）
  max_articles: 50             # 每次最多处理文章数（83个源，提高上限）
